name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Lint
  # ──────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend deps
        run: npm ci
        working-directory: backend

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Lint backend
        run: npm run lint
        working-directory: backend

      - name: Lint frontend
        run: npm run lint
        working-directory: frontend

  # ──────────────────────────────────────────────
  # Job 2: Backend Unit Tests
  # ──────────────────────────────────────────────
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Run unit tests with coverage
        run: npm test
        working-directory: backend

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage/

  # ──────────────────────────────────────────────
  # Job 3: Cypress Smoke Tests
  # ──────────────────────────────────────────────
  cypress-smoke:
    name: Cypress Smoke Tests
    runs-on: ubuntu-latest
    needs: backend-tests
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install backend deps & build
        run: npm ci && npm run build
        working-directory: backend

      - name: Install frontend deps & build
        run: npm ci && npm run build
        working-directory: frontend

      - name: Install Cypress deps
        run: npm ci
        working-directory: .

      - name: Start backend
        run: |
          NODE_ENV=production node backend/dist/index.js &
          echo "Backend PID: $!"
          npx wait-on http://localhost:3001/health --timeout 30000

      - name: Start frontend preview
        run: |
          cd frontend && npx vite preview --host --port 4173 &
          npx wait-on http://localhost:4173 --timeout 30000

      - name: Run Cypress smoke tests
        run: npx cypress run --spec "cypress/e2e/**/*.cy.ts" --env grepTags=@smoke
        env:
          CYPRESS_BASE_URL: http://localhost:4173
          CYPRESS_API_URL: http://localhost:3001

      - name: Upload Cypress screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots/

  # ──────────────────────────────────────────────
  # Job 4: Visual Regression Tests
  # ──────────────────────────────────────────────
  cypress-visual:
    name: Visual Regression Tests
    runs-on: ubuntu-latest
    needs: cypress-smoke
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install all deps
        run: |
          npm ci --prefix backend
          npm ci --prefix frontend
          npm ci

      - name: Build backend and frontend
        run: |
          npm run build --prefix backend
          npm run build --prefix frontend

      - name: Start services
        run: |
          NODE_ENV=production node backend/dist/index.js &
          cd frontend && npx vite preview --host --port 4173 &
          npx wait-on http://localhost:3001/health http://localhost:4173 --timeout 30000

      - name: Run visual regression tests
        run: npx cypress run --spec "cypress/e2e/visual.cy.ts"
        env:
          CYPRESS_BASE_URL: http://localhost:4173
          CYPRESS_API_URL: http://localhost:3001

      - name: Upload snapshot diffs on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: visual-diff-output
          path: cypress/snapshots/__diff_output__/

  # ──────────────────────────────────────────────
  # Job 5: Cypress Regression Tests (parallel)
  # ──────────────────────────────────────────────
  cypress-regression:
    name: Cypress Regression (${{ matrix.containers }})
    runs-on: ubuntu-latest
    needs: cypress-smoke
    strategy:
      fail-fast: false
      matrix:
        containers: [1, 2]  # Run 2 parallel containers
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install all deps
        run: |
          npm ci --prefix backend
          npm ci --prefix frontend
          npm ci

      - name: Build backend and frontend
        run: |
          npm run build --prefix backend
          npm run build --prefix frontend

      - name: Start services
        run: |
          NODE_ENV=production node backend/dist/index.js &
          cd frontend && npx vite preview --host --port 4173 &
          npx wait-on http://localhost:3001/health http://localhost:4173 --timeout 30000

      - name: Run Cypress regression tests (shard ${{ matrix.containers }}/2)
        run: |
          npx cypress run \
            --spec "cypress/e2e/**/*.cy.ts" \
            --env grepTags=@regression \
            --reporter json \
            --reporter-options "output=cypress/results/results-${{ matrix.containers }}.json"
        env:
          CYPRESS_BASE_URL: http://localhost:4173
          CYPRESS_API_URL: http://localhost:3001

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-results-${{ matrix.containers }}
          path: cypress/results/
