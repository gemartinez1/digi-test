name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Lint
  # ──────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend deps
        run: npm ci
        working-directory: backend

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Lint backend
        run: npm run lint
        working-directory: backend

      - name: Lint frontend
        run: npm run lint
        working-directory: frontend

  # ──────────────────────────────────────────────
  # Job 2: Backend Unit Tests
  # ──────────────────────────────────────────────
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Run unit tests with coverage
        run: npm test
        working-directory: backend

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage/

  # ──────────────────────────────────────────────
  # Job 3: Cypress Smoke Tests
  # ──────────────────────────────────────────────
  cypress-smoke:
    name: Cypress Smoke Tests
    runs-on: ubuntu-latest
    needs: backend-tests
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install backend deps & build
        run: npm ci && npm run build
        working-directory: backend

      - name: Install frontend deps & build
        run: npm ci && npm run build
        working-directory: frontend

      - name: Install Cypress deps
        run: npm ci
        working-directory: .

      - name: Start backend
        run: |
          NODE_ENV=production node backend/dist/index.js &
          echo "Backend PID: $!"
          npx wait-on http://localhost:3001/health --timeout 30000

      - name: Start frontend preview
        run: |
          cd frontend && npx vite preview --host --port 4173 &
          npx wait-on http://localhost:4173 --timeout 30000

      - name: Run Cypress smoke tests
        run: npx cypress run --spec "cypress/e2e/ui/*.cy.ts,cypress/e2e/api/*.cy.ts"
        env:
          CYPRESS_BASE_URL: http://localhost:4173
          CYPRESS_API_URL: http://localhost:3001

      - name: Generate smoke test report
        if: always()
        run: |
          npx mochawesome-merge 'cypress/reports/mocha/*.json' -o cypress/reports/mochawesome.json
          npx marge cypress/reports/mochawesome.json --reportDir cypress/reports --inline --reportTitle 'IoT Monitor Smoke'

      - name: Upload smoke test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-smoke-report
          path: |
            cypress/reports/mochawesome.html
            cypress/reports/mochawesome.json

      - name: Upload Cypress screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots/

  # ──────────────────────────────────────────────
  # Job 4: Cypress Regression Tests (parallel)
  # ──────────────────────────────────────────────
  cypress-regression:
    name: Cypress Regression (${{ matrix.containers }})
    runs-on: ubuntu-latest
    needs: cypress-smoke
    strategy:
      fail-fast: false
      matrix:
        containers: [1, 2]  # Run 2 parallel containers
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install all deps
        run: |
          npm ci --prefix backend
          npm ci --prefix frontend
          npm ci

      - name: Build backend and frontend
        run: |
          npm run build --prefix backend
          npm run build --prefix frontend

      - name: Start services
        run: |
          NODE_ENV=production node backend/dist/index.js &
          cd frontend && npx vite preview --host --port 4173 &
          npx wait-on http://localhost:3001/health http://localhost:4173 --timeout 30000

      - name: Run Cypress regression tests (shard ${{ matrix.containers }}/2)
        run: |
          npx cypress run \
            --spec "${{ matrix.containers == 1 && 'cypress/e2e/ui/*.cy.ts' || 'cypress/e2e/api/*.cy.ts' }}"
        env:
          CYPRESS_BASE_URL: http://localhost:4173
          CYPRESS_API_URL: http://localhost:3001

      - name: Upload mocha JSON (shard ${{ matrix.containers }})
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-regression-mocha-${{ matrix.containers }}
          path: cypress/reports/mocha/

  # ──────────────────────────────────────────────
  # Job 5: Merge regression shards and generate report
  # ──────────────────────────────────────────────
  report-regression:
    name: Generate Regression Report
    runs-on: ubuntu-latest
    needs: cypress-regression
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install root deps
        run: npm ci

      - name: Download shard 1 mocha JSON
        uses: actions/download-artifact@v4
        with:
          name: cypress-regression-mocha-1
          path: cypress/reports/mocha

      - name: Download shard 2 mocha JSON
        uses: actions/download-artifact@v4
        with:
          name: cypress-regression-mocha-2
          path: cypress/reports/mocha

      - name: Merge and generate report
        run: |
          npx mochawesome-merge 'cypress/reports/mocha/*.json' -o cypress/reports/mochawesome.json
          npx marge cypress/reports/mochawesome.json --reportDir cypress/reports --inline --reportTitle 'IoT Monitor Regression'

      - name: Upload regression report
        uses: actions/upload-artifact@v4
        with:
          name: cypress-regression-report
          path: |
            cypress/reports/mochawesome.html
            cypress/reports/mochawesome.json
